server:
  port: 8080
spring:
  application:
    name: teamd
  jackson:
    time-zone: UTC
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      show-components: always
  health:
    db:
      enabled: true
app:
  board:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
  auth:
    token-pepper: ${TOKEN_PEPPER}
  crypto:
    origin-key: ${ORIGIN_ENC_KEY}
  kakao:
    rest-key: ${KAKAO_REST_KEY:}
    base-url: https://dapi.kakao.com
  tmap:
    app-key: ${TMAP_APP_KEY:}
    base-url: https://apis.openapi.sk.com
  odsay:
    api-key: ${ODSAY_API_KEY:}
    base-url: https://api.odsay.com
  legacy-api-enabled: false
  job:
    enabled: ${JOB_ENABLED:false}
